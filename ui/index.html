<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>gtamaplib-vc</title>
    <link rel="icon" type="image/png" href="/ui/gtamaplib-vc.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="/ui/map3d.css">
  </head>
  <body>
    <div id="app">
      <header id="topbar">
        <img id="app-logo" src="/ui/gtamaplib-vc.png" alt="">
        <strong>gtamaplib-vc</strong>
        <button id="settings-button" type="button" title=",">Settings</button>
        <select id="view-select" title="View">
          <option value="camera">View Cameras</option>
          <option value="map">View Map</option>
        </select>
        <button id="map3d-button" type="button">3D Map</button>
        <span id="selection-title"></span>
        <nav id="edit-tools" aria-label="Observation tools">
          <button id="add-observation" type="button" title="A" hidden>Add</button>
          <button id="edit-observation" type="button" title="E" hidden>Edit</button>
          <button id="rename-landmark" type="button" title="R" hidden>Rename</button>
          <button id="remove-observation" type="button" title="DELETE" hidden>Remove</button>
        </nav>
      </header>

      <div id="workspace">
        <main id="viewer">
          <section id="viewport">
            <div id="stage">
              <img id="frame" alt="">
              <canvas id="map-canvas"></canvas>
              <svg id="guides-overlay"></svg>
              <svg id="overlay"></svg>
            </div>
            <canvas id="preview-canvas"></canvas>
          </section>
        </main>

        <aside class="panel" id="camera-panel">
          <header class="panel-tools">
            <div class="find-row">
              <input id="camera-find" type="search" placeholder="Find Camera">
              <button id="camera-find-clear" type="button" hidden>Clear</button>
            </div>
            <select id="camera-sort">
              <option value="ID">Sort by ID</option>
              <option value="name">Sort by Name</option>
              <option value="observations">Sort by Number of Observations</option>
            </select>
          </header>
          <div class="list" id="camera-list"></div>
          <div id="camera-preview" hidden>
            <canvas id="camera-map-preview"></canvas>
            <img id="camera-image-preview" alt="">
          </div>
          <footer class="panel-status" id="camera-status"></footer>
        </aside>

        <aside class="panel" id="landmark-panel">
          <header class="panel-tools">
            <div class="find-row">
              <input id="landmark-find" type="search" placeholder="Find Landmark">
              <button id="landmark-find-clear" type="button" hidden>Clear</button>
            </div>
            <select id="landmark-sort">
              <option value="ID">Sort by ID</option>
              <option value="name">Sort by Name</option>
              <option value="observations">Sort by Number of Observations</option>
            </select>
          </header>
          <div class="list" id="landmark-list"></div>
          <footer class="panel-status" id="landmark-status"></footer>
        </aside>
      </div>

      <footer id="global-status">
        <span id="camera-data"></span>
        <span id="landmark-data"></span>
      </footer>

      <div id="dialog-backdrop" hidden>
        <section id="dialog-panel" role="dialog" aria-modal="true" aria-labelledby="dialog-title">
          <header id="dialog-topbar">
            <strong id="dialog-title"></strong>
            <button id="dialog-close" type="button" title="ESC" aria-label="Close">Close</button>
          </header>
          <div id="dialog-content"></div>
        </section>
      </div>

      <div id="map3d-root" hidden>
        <canvas id="map3d-scene"></canvas>
        <canvas id="map3d-overlay"></canvas>
        <div id="map3d-left-controls">
          <button id="map3d-exit" type="button">Exit 3D</button>
          <button id="map3d-reset" type="button">Reset</button>
        </div>
        <div id="map3d-right-controls">
          <div id="map3d-tour-controls">
            <button id="map3d-tour-start" type="button">Start Tour</button>
            <button id="map3d-tour-back" type="button" title="LEFT" hidden>Back</button>
            <button id="map3d-tour-pause" type="button" title="SPACE" hidden>Pause</button>
            <button id="map3d-tour-forward" type="button" title="RIGHT" hidden>Forward</button>
            <button id="map3d-tour-stop" type="button" title="ESCAPE" hidden>Stop</button>
          </div>
        </div>
        <button id="map3d-game" type="button">Fasten Seatbelts</button>
        <div id="map3d-view-data"></div>
      </div>
    </div>
    <script type="module" src="app.js"></script>
  </body>
</html>
